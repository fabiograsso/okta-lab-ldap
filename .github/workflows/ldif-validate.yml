name: LDIF Check

on:
  push:
    paths:
      - '**.ldif'
  pull_request:
    paths:
      - '**.ldif'

jobs:
  ldif-validate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install OpenLDAP tools
        run: sudo apt-get update && sudo apt-get install -y ldap-utils

      - name: Validate LDIF files
        run: |
          for file in $(find . -name '*.ldif'); do
            echo "Checking $file"
            slapadd -u -f "$file"
          done